apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pg-operator
  namespace: default
spec:
  # Override Release name to avoid the pattern Namespace-Release
  # Ref: https://fluxcd.io/flux/components/helm/api/v2/#helm.toolkit.fluxcd.io/v2.HelmRelease
  releaseName: pg-operator
  targetNamespace: default
  interval: 10m
  chart:
    spec:
      chart: postgres-operator
      version: 1.15.1
      sourceRef:
        kind: HelmRepository
        name: pg-operator
        namespace: flux-system
  values:
    installCRDs: true
    enableJsonLogging: true
    enable_cross_namespace_secret: true
    configLogicalBackup:
      logical_backup_provider: s3
      logical_backup_s3_bucket: utro-a253e7cf-backups
      logical_backup_s3_bucket_prefix: spilo
      logical_backup_s3_region: eu-central-1
      logical_backup_s3_retention_time: 14 days
      logical_backup_schedule: '30 02 * * *'
      logical_backup_cronjob_environment_secret: postgres-backup-aws-creds

  # Ref: https://fluxcd.io/flux/components/helm/api/v2/#helm.toolkit.fluxcd.io/v2.Install
  install:
    createNamespace: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pg-operator-ui
  namespace: default
spec:
  # Override Release name to avoid the pattern Namespace-Release
  # Ref: https://fluxcd.io/flux/components/helm/api/v2/#helm.toolkit.fluxcd.io/v2.HelmRelease
  releaseName: pg-operator-ui
  targetNamespace: default
  interval: 10m
  chart:
    spec:
      chart: postgres-operator-ui
      version: 1.15.1
      sourceRef:
        kind: HelmRepository
        name: pg-operator-ui
        namespace: flux-system

  # Ref: https://fluxcd.io/flux/components/helm/api/v2/#helm.toolkit.fluxcd.io/v2.Install
  install:
    createNamespace: true