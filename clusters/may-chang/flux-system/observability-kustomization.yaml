apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-resources
      namespace: flux-system
    - name: cert-manager
      namespace: flux-system
    - name: tailscale-operator
      namespace: flux-system
  interval: 10m
  path: ./clusters/may-chang/observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 15m
