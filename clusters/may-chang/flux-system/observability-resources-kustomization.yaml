apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-resources
  namespace: flux-system
spec:
  dependsOn:
    - name: observability
      namespace: flux-system
  interval: 10m
  path: ./clusters/may-chang/observability-resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
