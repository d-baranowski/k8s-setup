# Sidecar CoreDNS replica.
#
# Why this exists, not `kubectl scale deploy/coredns --replicas=2`:
# the bundled CoreDNS Deployment in kube-system is owned by k3s's
# wrangler addon controller (annotation
# `objectset.rio.cattle.io/owner-gvk: k3s.cattle.io/v1, Kind=Addon`),
# rendered from /var/lib/rancher/k3s/server/manifests/coredns.yaml on
# every k3s start. Scaling it directly gets reverted on the next
# reconcile and fighting it would require --disable=coredns in NixOS
# plus a full CoreDNS redeploy.
#
# Instead we add a second Deployment whose pods carry the same
# `k8s-app: kube-dns` label that the `kube-dns` Service selects on,
# so they automatically join the Service's endpoint list. End result:
# two CoreDNS pods backing 10.43.0.10, one per node — exactly the
# anti-affinity goal — without touching the k3s-managed Deployment.
#
# The pod anti-affinity below targets the kube-dns label on
# hostname topology, which forces this replica off whichever node
# the bundled coredns pod currently lives on (today: may-chang →
# we land on xiao-mei). If the bundled pod migrates, we follow.
#
# We deliberately reuse the existing `coredns` ServiceAccount and
# `coredns` ConfigMap so we inherit RBAC and the Corefile (including
# the k3s-managed NodeHosts data) without duplicating either. This
# means a Corefile change pushed by k3s is picked up here too.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-replica
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/name: CoreDNS
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      k8s-app: kube-dns
      coredns-role: replica
  template:
    metadata:
      labels:
        # Joins the `kube-dns` Service endpoints (its selector is
        # `k8s-app: kube-dns` only — see `kubectl get svc kube-dns
        # -o yaml`). The extra `coredns-role: replica` label is a
        # tiebreaker for this Deployment's own selector so it doesn't
        # try to adopt the bundled CoreDNS pods.
        k8s-app: kube-dns
        coredns-role: replica
    spec:
      serviceAccountName: coredns
      priorityClassName: system-cluster-critical
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  k8s-app: kube-dns
              topologyKey: kubernetes.io/hostname
      containers:
        - name: coredns
          image: rancher/mirrored-coredns-coredns:1.14.1
          imagePullPolicy: IfNotPresent
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { containerPort: 53,   name: dns,     protocol: UDP }
            - { containerPort: 53,   name: dns-tcp, protocol: TCP }
            - { containerPort: 9153, name: metrics, protocol: TCP }
          livenessProbe:
            httpGet: { path: /health, port: 8080, scheme: HTTP }
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet: { path: /ready, port: 8181, scheme: HTTP }
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 70Mi
            limits:
              memory: 170Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: [NET_BIND_SERVICE]
              drop: [all]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config-volume
              mountPath: /etc/coredns
              readOnly: true
            - name: custom-config-volume
              mountPath: /etc/coredns/custom
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: coredns
            items:
              - { key: Corefile,  path: Corefile  }
              - { key: NodeHosts, path: NodeHosts }
        - name: custom-config-volume
          configMap:
            name: coredns-custom
            optional: true
