# One-shot DB migration Job for the core-event CDC service.
#
# Runs `core-event -migrate=true`, which applies app/core-event/db/*.sql via
# goose: sets REPLICA IDENTITY FULL on core.session/core.therapist and creates
# the `core_event_pub` publication. Those statements require table ownership,
# so this Job connects as the migrator (which owns the core schema), not the
# runtime core_event role.
#
# Depends on core's tables existing: if core-migrate hasn't created
# core.session/core.therapist yet, this fails and retries (backoffLimit) until
# they're present.
#
# Re-runs on image tag change via the $imagepolicy annotation + Flux's
# kustomize force-recreate (Job pod templates are immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: utr-staging-core-event-migrate
  namespace: default
  labels:
    app: utr-staging-core-event-migrate
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: utr-staging-core-event-migrate
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: ghcr.io/inspiration-particle/utro-core-event:0.1.60 # {"$imagepolicy": "flux-system:utr-staging-core-event"}
        command: ["/app/core-event"]
        args: ["-migrate=true"]
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: DB_SSL
          value: "true"
        - name: DB_NAME
          value: "utr_staging"
        - name: DB_HOST
          value: "pg-staging-cluster.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: utr-staging-migrator.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: utr-staging-migrator.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: password
