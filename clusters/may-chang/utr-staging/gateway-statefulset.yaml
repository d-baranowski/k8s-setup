apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: utr-staging-gateway
  namespace: default
  labels:
    app: utr-staging-gateway
spec:
  serviceName: utr-staging-gateway
  replicas: 2
  selector:
    matchLabels:
      app: utr-staging-gateway
  template:
    metadata:
      labels:
        app: utr-staging-gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/inspiration-particle/utro-gateway:0.1.56 # {"$imagepolicy": "flux-system:utr-staging-gateway"}
        ports:
        - containerPort: 9999
          name: api
        - containerPort: 18007
          name: health
        env:
        - name: TIMEZONE
          value: "Europe/Warsaw"
        - name: HEALTH_PORT
          value: "18007"
        - name: API_PORT
          value: "9999"
        - name: USER
          value: "postgres"
        - name: LOG_LEVEL
          value: "debug"
        - name: PAYMENT_SERVICE
          value: "utr-staging-payment.default.svc.cluster.local:9102"
        - name: NOTIFICATION_SERVICE
          value: "utr-staging-notification.default.svc.cluster.local:9002"
        - name: CORE_SERVICE
          value: "utr-staging-core.default.svc.cluster.local:9102"
        - name: WITH_PERMISSIONS
          value: "true"
        - name: ENABLE_PERMISSIONS
          value: "true"
        - name: RPG_PERMISSIONS_FLAG
          value: "true"
        - name: SERVICE_VERSION
          value: "0.1.56" # {"$imagepolicy": "flux-system:utr-staging-gateway:tag"}
        - name: SERVICE_NAME
          value: "rpg.gateway"
        - name: SERVICE_ENV
          value: "staging"
        - name: TR_ENABLED
          value: "true"
        - name: TR_ENDPOINT
          value: "otel-collector.observability.svc.cluster.local:4318"
        - name: TR_HTTPS
          value: "false"
        - name: DB_TRACE
          value: "true"
        - name: DB_SSL
          value: "true"
        - name: DB_NAME
          value: "utr_staging"
        - name: DB_HOST
          value: "pg-staging-cluster.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: utr-staging-user.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: utr-staging-user.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: password
        livenessProbe:
          httpGet:
            path: /live
            port: health
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: health
          initialDelaySeconds: 60
          periodSeconds: 5
