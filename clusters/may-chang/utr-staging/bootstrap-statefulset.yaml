apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: utr-staging-bootstrap
  namespace: default
  labels:
    app: utr-staging-bootstrap
spec:
  serviceName: utr-staging-bootstrap
  replicas: 1
  selector:
    matchLabels:
      app: utr-staging-bootstrap
  template:
    metadata:
      labels:
        app: utr-staging-bootstrap
    spec:
      containers:
      - name: bootstrap
        image: ghcr.io/inspiration-particle/utro-bootstrap:0.1.52 # {"$imagepolicy": "flux-system:utr-staging-bootstrap"}
        ports:
        - containerPort: 8080
          name: api
        - containerPort: 18008
          name: health
        env:
        - name: TIMEZONE
          value: "Europe/Warsaw"
        - name: HEALTH_PORT
          value: "18008"
        - name: BOOTSTRAP_API_PORT
          value: "8080"
        - name: LOG_LEVEL
          value: "debug"
        - name: ENABLE_DEV_API
          value: "true"
        - name: CORE_API_URL
          value: "http://utr-staging-core.default.svc.cluster.local:9102"
        - name: NOTIFICATION_API_URL
          value: "http://utr-staging-notification.default.svc.cluster.local:9002"
        - name: SERVICE_VERSION
          value: "0.1.52" # {"$imagepolicy": "flux-system:utr-staging-bootstrap:tag"}
        - name: SERVICE_NAME
          value: "rpg-bootstrap"
        - name: SERVICE_ENV
          value: "staging"
        - name: TR_ENABLED
          value: "true"
        - name: TR_ENDPOINT
          value: "otel-collector.observability.svc.cluster.local:4318"
        - name: TR_HTTPS
          value: "false"
        - name: DB_TRACE
          value: "true"
        - name: DB_SSL
          value: "true"
        - name: DB_NAME
          value: "utr_staging"
        - name: DB_HOST
          value: "pg-staging-cluster.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: utr-staging-migrator.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: utr-staging-migrator.pg-staging-cluster.credentials.postgresql.acid.zalan.do
              key: password
        livenessProbe:
          httpGet:
            path: /live
            port: health
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: health
          initialDelaySeconds: 60
          periodSeconds: 5
