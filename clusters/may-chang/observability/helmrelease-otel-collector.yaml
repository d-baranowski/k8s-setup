apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.153.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  values:
    fullnameOverride: otel-collector
    mode: deployment
    replicaCount: 1

    # Use the contrib distribution — needed for `prometheusremotewrite`
    # exporter (which is not in the core image).
    image:
      repository: otel/opentelemetry-collector-contrib

    # Disable the chart's "preset" pipelines — we author the full config
    # ourselves below.
    presets:
      logsCollection:
        enabled: false
      kubernetesAttributes:
        enabled: false
      hostMetrics:
        enabled: false

    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        protocol: TCP
      # Disable the default Jaeger / Zipkin ports we don't use.
      jaeger-compact:
        enabled: false
      jaeger-thrift:
        enabled: false
      jaeger-grpc:
        enabled: false
      zipkin:
        enabled: false
      metrics:
        enabled: false

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    serviceMonitor:
      enabled: true

    # Fan-out router: utro apps push OTLP, traces go to Tempo, metrics go
    # to Prometheus via remote_write. Logs are dropped — Loki gets app
    # logs via Promtail scraping stdout.
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

      processors:
        batch:
          timeout: 5s
          send_batch_size: 1024
        memory_limiter:
          check_interval: 1s
          limit_percentage: 80
          spike_limit_percentage: 25

      exporters:
        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true
        prometheusremotewrite:
          endpoint: http://kps-prometheus.observability.svc.cluster.local:9090/api/v1/write
          # Pass resource attributes (service.name, service.env, etc.) as
          # labels so dashboards can filter by service_name.
          resource_to_telemetry_conversion:
            enabled: true

      service:
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/tempo]
          metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheusremotewrite]
        telemetry:
          logs:
            level: info
