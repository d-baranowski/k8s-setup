# Admin credentials for the Grafana instance. The values live in GCP Secret
# Manager (secrets: grafana-admin-user, grafana-admin-password) and are synced
# into the cluster by External Secrets Operator.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: google-secrets
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GF_SECURITY_ADMIN_USER
      remoteRef:
        key: grafana-admin-user
        version: latest
    - secretKey: GF_SECURITY_ADMIN_PASSWORD
      remoteRef:
        key: grafana-admin-password
        version: latest
