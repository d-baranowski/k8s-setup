apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      version: "6.40.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  values:
    deploymentMode: SingleBinary

    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are injected from the
    # `loki-s3-credentials` Secret (synced via ExternalSecret). Bucket name
    # is the deterministic one created by Terraform.
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: s3
        bucketNames:
          chunks: utro-loki-chunks
          ruler: utro-loki-chunks
          admin: utro-loki-chunks
        s3:
          region: eu-central-1
          s3ForcePathStyle: false
          insecure: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 336h  # 14 days
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        max_query_length: 721h
      compactor:
        retention_enabled: true
        delete_request_store: s3
      ruler:
        enable_api: true

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      extraEnvFrom:
        - secretRef:
            name: loki-s3-credentials

    # Disable distributed components in single-binary mode
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # Disable bundled monitoring/canaries (we run our own Prometheus)
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
    test:
      enabled: false

    # Built-in gateway is unnecessary for single binary
    gateway:
      enabled: false

    # Expose metrics for Prometheus to scrape
    serviceMonitor:
      enabled: true
      labels: {}
