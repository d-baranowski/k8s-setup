apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "85.0.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    timeout: 15m
  upgrade:
    crds: CreateReplace
    timeout: 15m
  values:
    fullnameOverride: kps
    # Grafana is managed by grafana-operator, not by this chart.
    grafana:
      enabled: false
      forceDeployDatasources: false
      forceDeployDashboards: false

    # Discover ServiceMonitor / PodMonitor / PrometheusRule from all namespaces.
    prometheusOperator:
      admissionWebhooks:
        certManager:
          enabled: true
          issuerRef:
            name: selfsigned-issuer
            kind: ClusterIssuer

    prometheus:
      prometheusSpec:
        retention: 14d
        retentionSize: ""
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorNamespaceSelector: {}
        ruleNamespaceSelector: {}
        # Remote write from Tempo's metrics-generator (service graph + span
        # metrics) — Tempo pushes to Prometheus via /api/v1/write. The
        # prometheus-operator field below maps to the `--web.enable-remote-write-receiver`
        # CLI flag; `enableFeatures: [remote-write-receiver]` does NOT (it's
        # a separate Prometheus feature-flag mechanism and doesn't enable the
        # HTTP receiver endpoint).
        enableRemoteWriteReceiver: true
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi

    alertmanager:
      enabled: true
      alertmanagerSpec:
        retention: 240h
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi

    kube-state-metrics:
      enabled: true
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      hostRootFsMount:
        enabled: true

    # k0s-specific: kubelet/api-server are reachable but several control-plane
    # components are managed by k0s in-process. Disable the scrape targets that
    # don't have separate endpoints to avoid noisy "down" alerts.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
