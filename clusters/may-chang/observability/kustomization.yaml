apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# No top-level `namespace:` field: HelmRepositories must live in flux-system
# (where the helm-controller resolves `sourceRef`), while everything else
# already declares `metadata.namespace: observability` explicitly. A global
# kustomize-level namespace would override the flux-system one and break the
# HelmReleases.

# This directory only holds CRD-safe resources (namespace, ExternalSecrets,
# HelmRepository/HelmRelease, Certificate, ClusterRole/CronJob, etc.) — every
# kind here already has its CRD on the cluster. The Grafana/GrafanaDatasource/
# GrafanaDashboard CRs live in clusters/may-chang/observability-resources/ and
# are reconciled by a separate Flux Kustomization with dependsOn: observability
# so the root sweep never trips on missing operator CRDs.
resources:
  - namespace.yaml
  # External Secrets (S3 creds + grafana admin creds)
  - loki-s3-credentials.yaml
  - tempo-s3-credentials.yaml
  - grafana-admin-secret.yaml
  # Helm repos
  - helmrepo-prometheus-community.yaml
  - helmrepo-grafana.yaml
  - helmrepo-grafana-operator.yaml
  # Helm releases
  - helmrelease-kube-prometheus-stack.yaml
  - helmrelease-loki.yaml
  - helmrelease-promtail.yaml
  - helmrelease-tempo.yaml
  - helmrelease-grafana-operator.yaml
  # Tailscale exposure
  - grafana-nginx-proxy.yaml
  - grafana-cert-sync.yaml
