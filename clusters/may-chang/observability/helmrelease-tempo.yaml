apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  values:
    fullnameOverride: tempo

    persistence:
      enabled: true
      size: 10Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 2Gi

    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are injected from the
    # `tempo-s3-credentials` Secret (synced via ExternalSecret). Bucket
    # name is the deterministic one created by Terraform.
    extraEnvFrom:
      - secretRef:
          name: tempo-s3-credentials

    # Tempo monolithic config
    tempo:
      retention: 336h  # 14 days

      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

      # Enable service-graph + span-metrics generators so the existing utro
      # dashboards (traces_service_graph_request_*) keep working. Metrics are
      # remote-written to Prometheus.
      metricsGenerator:
        enabled: true
        remoteWriteUrl: "http://kps-kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write"

      storage:
        trace:
          backend: s3
          s3:
            bucket: utro-tempo-traces
            endpoint: s3.eu-central-1.amazonaws.com
            region: eu-central-1
            forcepathstyle: false
            # access_key / secret_key picked up from env (AWS_*)
          # WAL on local disk
          wal:
            path: /var/tempo/wal
          pool:
            max_workers: 100
            queue_depth: 10000

      # Overrides for metrics-generator processors
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics

    serviceMonitor:
      enabled: true
