apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: grafana-operator
      version: "5.22.2"
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    namespaceScope: false  # watch all namespaces (we only use one, but keeps doors open)
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
