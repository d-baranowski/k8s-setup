apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost
  namespace: default
spec:
  size: 1000users
  replicas: 1
  version: 10.5.0
  licenseSecret: ""
  ingress:
    enabled: false
  database:
    external:
      secret: mattermost-db-secret
  fileStore:
    external:
      url: s3.eu-central-1.amazonaws.com
      bucket: mattermost-filestore
      secret: mattermost-filestore-secret
  mattermostEnv:
    - name: MM_FILESETTINGS_AMAZONS3BUCKET
      valueFrom:
        secretKeyRef:
          name: mattermost-filestore-secret
          key: bucketName
    - name: MM_FILESETTINGS_AMAZONS3SSE
      value: "true"
    - name: MM_FILESETTINGS_AMAZONS3SSL
      value: "true"
    - name: MM_FILESETTINGS_AMAZONS3REGION
      value: eu-central-1
