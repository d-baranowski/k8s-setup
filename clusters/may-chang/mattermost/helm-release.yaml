apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: mattermost-operator
      version: "1.0.4"
      sourceRef:
        kind: HelmRepository
        name: mattermost
        namespace: flux-system
  values:
    mattermostOperator:
      enabled: true
      replicas: 1
      rbac:
        create: true
      serviceAccount:
        create: true
      env:
        maxReconcilingInstallations: 20
        maxReconcilingConcurrency: 10
        requeuOnLimitDelay: 20s
      image:
        repository: mattermost/mattermost-operator
        tag: v1.24.0
        pullPolicy: IfNotPresent
      args:
        - --enable-leader-election
        - --metrics-addr=0.0.0.0:8383

      ## Specify image pull secret for private repository
      ##
      privateRegistry:
        enabled: false
        imagePullSecret: <name of the secret>