# Non-headless ClusterIP Service for Mattermost pods.
#
# The Mattermost operator creates a headless service (clusterIP: None) which
# cannot be used by nginx's upstream directive. This service provides a stable
# ClusterIP endpoint for the nginx reverse proxy to forward traffic to.
---
apiVersion: v1
kind: Service
metadata:
  name: mattermost-tailscale-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: mattermost
    installation.mattermost.com/installation: mattermost
    installation.mattermost.com/resource: mattermost
  ports:
    - name: http
      port: 8065
      targetPort: app
      protocol: TCP
