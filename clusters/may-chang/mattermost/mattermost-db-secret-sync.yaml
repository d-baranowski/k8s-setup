# CronJob that syncs the Postgres operator-generated password for mattermost_user
# into a secret formatted for the Mattermost operator (DB_CONNECTION_STRING).
#
# Why: The Zalando Postgres Operator auto-generates user passwords and stores them
# in secrets named {user}.{cluster}.credentials.postgresql.acid.zalan.do.
# The Mattermost operator expects a secret with DB_CONNECTION_STRING containing
# the full connection URI. This CronJob bridges the two.
#
# Source secret: mattermost-user.pg-op-cluster.credentials.postgresql.acid.zalan.do
# Target secret: mattermost-db-secret
#
# Schedule: every 15 minutes (also runs once at deploy via the Job below)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mattermost-db-secret-sync
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mattermost-db-secret-sync
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "mattermost-user.pg-op-cluster.credentials.postgresql.acid.zalan.do"
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "mattermost-db-secret"
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mattermost-db-secret-sync
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mattermost-db-secret-sync
subjects:
  - kind: ServiceAccount
    name: mattermost-db-secret-sync
    namespace: default
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mattermost-db-secret-sync
  namespace: default
spec:
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: mattermost-db-secret-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: dtzar/helm-kubectl:3.19.1
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  SOURCE_SECRET="mattermost-user.pg-op-cluster.credentials.postgresql.acid.zalan.do"
                  TARGET_SECRET="mattermost-db-secret"
                  DB_HOST="pg-op-cluster"
                  DB_PORT="5432"
                  DB_NAME="mattermost"

                  # Read password from PG operator secret
                  PASSWORD=$(kubectl get secret "$SOURCE_SECRET" -o jsonpath='{.data.password}' | base64 -d)
                  USERNAME=$(kubectl get secret "$SOURCE_SECRET" -o jsonpath='{.data.username}' | base64 -d)

                  if [ -z "$PASSWORD" ] || [ -z "$USERNAME" ]; then
                    echo "ERROR: Could not read credentials from $SOURCE_SECRET"
                    exit 1
                  fi

                  CONN_STRING="postgres://${USERNAME}:${PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?connect_timeout=10&sslmode=disable"

                  # Create or update the target secret
                  kubectl create secret generic "$TARGET_SECRET" \
                    --from-literal=DB_CONNECTION_STRING="$CONN_STRING" \
                    --from-literal=DB_CONNECTION_CHECK_URL="$CONN_STRING" \
                    --from-literal=MM_SQLSETTINGS_DATASOURCEREPLICAS="$CONN_STRING" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "Successfully synced $TARGET_SECRET"
