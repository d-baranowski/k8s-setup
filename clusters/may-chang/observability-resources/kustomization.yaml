apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources here already declare `metadata.namespace: observability`
# explicitly; the top-level kustomize namespace is intentionally omitted to
# stay consistent with clusters/may-chang/observability/kustomization.yaml.

# Grafana CRs are reconciled only by the dedicated `observability-resources`
# Flux Kustomization (dependsOn: observability). They are intentionally NOT
# referenced by clusters/may-chang/kustomization.yaml so the root sweep never
# tries to apply them before grafana-operator has installed its CRDs.
resources:
  - grafana.yaml
  - grafana-datasources.yaml
  - grafana-dashboards.yaml
  # Host + cluster resource dashboards (Node Exporter Full + dotdc K8s views).
  - infrastructure-dashboards.yaml
  # Tailscale exposure for Grafana — same Kustomization as the Grafana CR
  # so nginx's upstream (the Service the operator creates from the CR) is
  # applied in the same batch. Avoids the nginx-stuck-without-upstream
  # deadlock that would otherwise stall the `observability` Kustomization.
  - grafana-nginx-proxy.yaml
  - grafana-cert-sync.yaml

configMapGenerator:
  - name: utro-dashboard-services
    namespace: observability
    files:
      - utro-services.json
  - name: utro-dashboard-traces
    namespace: observability
    files:
      - utro-traces.json
  - name: utro-dashboard-db-pool
    namespace: observability
    files:
      - utro-db-pool.json
  - name: utro-dashboard-db-queries
    namespace: observability
    files:
      - utro-db-queries.json
  # Vendored community dashboards (patched — see infrastructure-dashboards.yaml).
  - name: infra-dashboard-node-exporter-full
    namespace: observability
    files:
      - node-exporter-full.json
  - name: infra-dashboard-k8s-views-global
    namespace: observability
    files:
      - k8s-views-global.json
  - name: infra-dashboard-k8s-views-nodes
    namespace: observability
    files:
      - k8s-views-nodes.json

generatorOptions:
  # Stable names so the GrafanaDashboard CRs can reference them.
  disableNameSuffixHash: true
