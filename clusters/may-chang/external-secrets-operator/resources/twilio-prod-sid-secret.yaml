apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: twilio-prod-sid
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: google-secrets
    kind: ClusterSecretStore
  target:
    name: twilio-prod-sid
    creationPolicy: Owner
  data:
    - secretKey: value
      remoteRef:
        key: twilio-prod-sid
        version: latest
