 apiVersion: external-secrets.io/v1beta1
 kind: ExternalSecret
 metadata:
    name: stripe-secret-key
    namespace: default
 spec:
    refreshInterval: 1h
    secretStoreRef:
     name: google-secrets
     kind: ClusterSecretStore
    target:
     name: stripe-secret-key
     creationPolicy: Owner
    data:
      - secretKey: value
        remoteRef:
          key: stripe-secret-key
          version: latest
