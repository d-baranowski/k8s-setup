apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: google-secrets
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # `trim` guards against a stray trailing newline in the stored token
        # (e.g. added via `echo` or an editor), which would otherwise inject a
        # raw newline into the JSON string and make the dockerconfigjson invalid.
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"edwardelriczeroclaw-spec","password":"{{ .token | trim }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: ghcr-pull-token
        version: latest
