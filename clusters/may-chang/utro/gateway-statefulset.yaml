apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: utro-gateway
  namespace: default
  labels:
    app: utro-gateway
spec:
  serviceName: utro-gateway
  replicas: 2
  selector:
    matchLabels:
      app: utro-gateway
  template:
    metadata:
      labels:
        app: utro-gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/inspiration-particle/utro-gateway:0.1.1 # {"$imagepolicy": "flux-system:utro-gateway"}
        ports:
        - containerPort: 9999
          name: api
        - containerPort: 18007
          name: health
        env:
        - name: TIMEZONE
          value: "Europe/Warsaw"
        - name: HEALTH_PORT
          value: "18007"
        - name: API_PORT
          value: "9999"
        - name: USER
          value: "postgres"
        - name: LOG_LEVEL
          value: "debug"
        - name: PAYMENT_SERVICE
          value: "utro-payment.default.svc.cluster.local:9102"
        - name: CORE_SERVICE
          value: "utro-core.default.svc.cluster.local:9102"
        - name: WITH_PERMISSIONS
          value: "true"
        - name: ENABLE_PERMISSIONS
          value: "true"
        - name: RPG_PERMISSIONS_FLAG
          value: "true"
        - name: DB_SSL
          value: "true"
        - name: DB_NAME
          value: "utro"
        - name: DB_HOST
          value: "pg-op-cluster.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: utro-user.pg-op-cluster.credentials.postgresql.acid.zalan.do
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: utro-user.pg-op-cluster.credentials.postgresql.acid.zalan.do
              key: password
        livenessProbe:
          httpGet:
            path: /live
            port: health
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: health
          initialDelaySeconds: 60
          periodSeconds: 5
